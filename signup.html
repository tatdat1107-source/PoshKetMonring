	<div class="container" id="hobbies">
		<h1 class="heading">Sign Up</h1>
		<form>
			<div class="row">
				<div class="col-6">
					<div class="mb-3">
						<input class="form-control" id="first_name" placeholder="first_name">
					</div>
				</div>
				<div class="col-6">
					<div class="mb-3">
						<input class="form-control" id="last_name" placeholder="last_name">
					</div>
				</div>
			</div>

			<div class="mb-3">
				<input class="form-control" id="email" placeholder="abc@gmail.com">
			</div>

			<div class="mb-3">
				<input class="form-control" id="sdt" placeholder="+84 0123456789">
			</div>

			<div class="mb-3">
				<input class="form-control" id="password" placeholder="*********">
			</div>

			<div class="mb-3">
				<input class="form-control" id="password confirm" placeholder="*********">
			</div>

			<div class="row mb-3">
				<div class="col-4">
					<input type="radio" name="flexRadioDefault" class="form-check-input" id="Male">
					<label class="form-check-label" id="Male">
					Male	
					</label>
				</div>
				<div class="col-4">
					<input type="radio" name="flexRadioDefault" class="form-check-input" id="Female">
					<label class="form-check-label" id="Female">
					Female	
					</label>
				</div>
				<div class="col-4">
					<input type="radio" name="flexRadioDefault" class="form-check-input" id="Other">
					<label class="form-check-label" id="Other">
					Other	
					</label>
				</div>
			</div>
			
			<label>Your Region</label>
			<select class="form-select mb-3">
				<option selected>Choose your region</option>
				<option value="1">Ocean</option>
				<option value="2">Asia</option>
				<option value="3">Africa</option>
				<option value="4">Europe</option>
				<option value="5">South America</option>
				<option value="6">North America</option>
			</select>

			<button type="submit" class="btn btn-primary">SUBMIT</button>

		</form>
